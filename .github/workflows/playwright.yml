# Workflow name displayed in GitHub Actions tab
name: Playwright Tests

# Events that trigger this workflow
on:

  # Run workflow whenever code is pushed
  push:
    branches: [ main, master ]

  # Run workflow whenever a pull request is created/updated
  pull_request:
    branches: [ main, master ]

jobs:

  # Job name
  test:

    # GitHub-hosted runner (Ubuntu Linux VM)
    runs-on: ubuntu-latest

    steps:

      # Step 1:
      # Checkout repository code into the runner
      # Without this step, GitHub runner won't have access to your project files
      - uses: actions/checkout@v4

      # Step 2:
      # Build Docker image(s) defined in docker-compose.yml
      # Executes Dockerfile instructions and prepares containers
      - name: Build
        run: docker compose build

      # Step 3:
      # Start Playwright container and execute tests
      # --rm automatically removes the container after execution
      # Prevents accumulation of stopped containers
      - name: Execute Tests
        run: docker compose run --rm playwright

      # Step 4:
      # Upload Playwright HTML report as a GitHub artifact
      # Artifacts can be downloaded after workflow completion
      - name: Upload Report
        uses: actions/upload-artifact@v4

        # Run this step regardless of test result
        # Report will be uploaded even if tests fail
        if: always()

        with:
          # Artifact name shown in GitHub Actions UI
          name: playwright-report

          # Location of generated Playwright HTML report
          path: playwright-report/